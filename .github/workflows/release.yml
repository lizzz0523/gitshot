name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            artifact: gitshot-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: gitshot-aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gitshot dist/
          cd dist
          zip ${{ matrix.artifact }}.zip gitshot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gitshot-x86_64-apple-darwin/gitshot-x86_64-apple-darwin.zip
            artifacts/gitshot-aarch64-apple-darwin/gitshot-aarch64-apple-darwin.zip

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Calculate SHA256
        id: sha
        run: |
          ARM_URL="https://github.com/lizzz0523/gitshot/releases/download/${GITHUB_REF_NAME}/gitshot-aarch64-apple-darwin.zip"
          INTEL_URL="https://github.com/lizzz0523/gitshot/releases/download/${GITHUB_REF_NAME}/gitshot-x86_64-apple-darwin.zip"

          ARM_SHA=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)
          INTEL_SHA=$(curl -sL "$INTEL_URL" | shasum -a 256 | cut -d' ' -f1)

          echo "arm=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${INTEL_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v4
        with:
          repository: lizzz0523/homebrew-devkit
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate and commit formula
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ARM_SHA="${{ steps.sha.outputs.arm }}"
          INTEL_SHA="${{ steps.sha.outputs.intel }}"
          TAG="${GITHUB_REF_NAME}"

          cat > Formula/gitshot.rb <<EOF
          class Gitshot < Formula
            desc "Render git diff and status as PNG images"
            homepage "https://github.com/lizzz0523/gitshot"
            url "https://github.com/lizzz0523/gitshot/releases/download/${TAG}/gitshot-aarch64-apple-darwin.zip"
            sha256 "${ARM_SHA}"
            version "${VERSION}"

            depends_on :macos

            on_intel do
              url "https://github.com/lizzz0523/gitshot/releases/download/${TAG}/gitshot-x86_64-apple-darwin.zip"
              sha256 "${INTEL_SHA}"
            end

            def install
              bin.install "gitshot"
            end

            test do
              assert_match "gitshot", shell_output("\#{bin}/gitshot --help")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitshot.rb
          git commit -m "gitshot ${VERSION}"
          git push
